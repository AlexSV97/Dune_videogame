<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrakis te espera</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a55a;
            --gold-dim: #8a6f35;
            --sand: #b8956e;
            --dark: #080808;
            --dark-overlay: rgba(8, 8, 8, 0.85);
            --text: #e8e0d0;
            --text-muted: #8a8578;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background-color: var(--dark);
            color: var(--text);
        }

        .landing {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: 
                linear-gradient(180deg, 
                    rgba(8, 8, 8, 0.7) 0%, 
                    rgba(8, 8, 8, 0.5) 50%,
                    rgba(8, 8, 8, 0.9) 100%),
                url('https://images.unsplash.com/photo-1509316785289-025f5b846b35?w=1920&q=80') center/cover no-repeat;
        }

        .landing::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse at 50% 80%, rgba(201, 165, 110, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 20%, rgba(139, 107, 61, 0.05) 0%, transparent 40%);
            pointer-events: none;
        }

        .sand-overlay {
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
        }

        .symbol {
            font-size: 4rem;
            color: var(--gold);
            opacity: 0.6;
            margin-bottom: 30px;
            animation: pulse 4s ease-in-out infinite;
            text-shadow: 0 0 40px rgba(201, 165, 110, 0.3);
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        .message {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 60px;
        }

        .countdown {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .countdown-number {
            font-family: 'Cinzel', serif;
            font-size: 8rem;
            font-weight: 700;
            color: var(--gold);
            line-height: 1;
            position: relative;
            text-shadow: 0 0 60px rgba(201, 165, 110, 0.5);
            min-width: 120px;
        }

        .countdown-number::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .countdown-label {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 20px;
        }

        .skip {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-decoration: none;
            opacity: 0.5;
            transition: all 0.3s ease;
            letter-spacing: 0.1em;
        }

        .skip:hover {
            opacity: 1;
            color: var(--gold);
        }

        .particles {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0.4;
            animation: drift 20s infinite linear;
        }

        @keyframes drift {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% {
                transform: translateY(-10vh) translateX(50px);
                opacity: 0;
            }
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 18s; }
        .particle:nth-child(2) { left: 25%; animation-delay: 3s; animation-duration: 22s; }
        .particle:nth-child(3) { left: 40%; animation-delay: 1s; animation-duration: 20s; }
        .particle:nth-child(4) { left: 55%; animation-delay: 5s; animation-duration: 19s; }
        .particle:nth-child(5) { left: 70%; animation-delay: 2s; animation-duration: 21s; }
        .particle:nth-child(6) { left: 85%; animation-delay: 4s; animation-duration: 23s; }
        .particle:nth-child(7) { left: 15%; animation-delay: 6s; animation-duration: 17s; }
        .particle:nth-child(8) { left: 60%; animation-delay: 7s; animation-duration: 24s; }

        .countdown-number {
            animation: fadeCount 0.5s ease;
        }

        @keyframes fadeCount {
            from { 
                opacity: 0; 
                transform: translateY(-20px) scale(0.9); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }

        .fade-out {
            animation: fadeOut 1.5s ease forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(1); filter: blur(0); }
            100% { opacity: 0; transform: scale(1.1); filter: blur(10px); }
        }

        @media (max-width: 768px) {
            .countdown-number {
                font-size: 5rem;
                min-width: 80px;
            }
            
            .symbol {
                font-size: 3rem;
            }
            
            .message {
                font-size: 0.9rem;
                letter-spacing: 0.2em;
            }
        }
    </style>
</head>
<body>
    <div class="landing" id="landing">
        <div class="sand-overlay"></div>
        <div class="particles">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>
        
        <div class="content">
            <div class="symbol">◇</div>
            <p class="message">El desierto llama</p>
            
            <div class="countdown">
                <div>
                    <div class="countdown-number" id="countdown">10</div>
                    <p class="countdown-label">attendez</p>
                </div>
            </div>
        </div>
        
        <a href="main.html" class="skip">Entrar ahora</a>
    </div>

    <script>
        const countdownEl = document.getElementById('countdown');
        const landing = document.getElementById('landing');
        let count = 10;
        
        const countdown = setInterval(() => {
            count--;
            
            if (count > 0) {
                countdownEl.style.animation = 'none';
                countdownEl.offsetHeight;
                countdownEl.style.animation = 'fadeCount 0.5s ease';
                countdownEl.textContent = count;
            } else {
                clearInterval(countdown);
                countdownEl.textContent = '0';
                landing.classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = 'main.html';
                }, 1500);
            }
        }, 1000);
    </script>
</body>
</html>
